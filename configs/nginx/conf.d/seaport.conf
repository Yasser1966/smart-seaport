upstream nextjs   { server seaport-frontend:3000; }
upstream manager  { server seaport-manager:8080; }
upstream ai       { server seaport-ai:8000; }
upstream keycloak { server seaport-keycloak:8080; }
upstream mqtt_ws  { server seaport-mosquitto:9001; }

server {
    listen 80;
    server_name _;

    large_client_header_buffers 4 32k;
    client_header_buffer_size 32k;
    client_max_body_size 50M;

    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
    location /auth/ {
        proxy_pass http://keycloak/auth/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }
    location /api/ {
        proxy_pass http://manager/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
    }
    location /ai/ {
        proxy_pass http://ai/;
        proxy_http_version 1.1;
        proxy_set_header Host      $host;
        client_max_body_size 50M;
        proxy_read_timeout 120s;
    }
    location /mqtt {
        proxy_pass http://mqtt_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_read_timeout 300s;
    }
}